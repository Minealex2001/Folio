name: Bug report
description: Report a bug or regression in Folio
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide enough detail so we can reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: Explain the issue in 1-3 sentences.
      placeholder: Opening a page with PDF attachments causes the app to crash.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide clear, ordered steps.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: The app should open the file without crashing.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: The app closes without any message.
    validations:
      required: true
  - type: input
    id: flutter_version
    attributes:
      label: Flutter version
      description: Output of `flutter --version`
      placeholder: Flutter 3.x.x
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Web
        - Android
        - iOS
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots (optional)
      description: Paste relevant stack traces and/or screenshots.
      render: shell
