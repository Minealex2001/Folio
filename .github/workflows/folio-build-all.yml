# Equivale a builld_all.ps1: Windows (ZIP GitHub + MSIX opcional), APK Android, ZIP Linux.
# Manual: Actions → "Folio build all" → Run workflow.
#
# Opcional: secret repo FOLIO_MS_STORE_ENV (multilínea) con solo líneas MS_STORE_* para el build Store.
# Ej.: MS_STORE_PRODUCT_FOLIO_CLOUD_MONTHLY=9PP1X9T3PX31
name: Folio build all

on:
  workflow_dispatch:
    inputs:
      skip_msix:
        description: Omitir segundo build Windows + MSIX
        type: boolean
        default: false

concurrency:
  group: folio-build-all-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REPO_DIR: source
  FLUTTER_PIN: db50e20168

jobs:
  windows:
    name: Windows (builld_all.ps1)
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      SKIP_MSIX_INPUT: ${{ inputs.skip_msix }}
    steps:
      - name: Checkout
        shell: pwsh
        run: |
          $repoUrl = "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --no-tags --depth 1 $repoUrl $env:REPO_DIR
          Set-Location $env:REPO_DIR
          git fetch --no-tags --depth 1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD

      - name: Install Flutter SDK (pinned)
        shell: pwsh
        run: |
          $flutterDir = Join-Path $env:USERPROFILE 'flutter'
          if (-not (Test-Path (Join-Path $flutterDir 'bin\flutter.bat'))) {
            git clone https://github.com/flutter/flutter.git $flutterDir
          }
          Set-Location $flutterDir
          git fetch --depth 1 origin $env:FLUTTER_PIN
          git checkout --detach FETCH_HEAD
          (Join-Path $flutterDir 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Flutter version
        shell: pwsh
        run: flutter --version

      - name: Optional MS_STORE env for Store build
        shell: pwsh
        working-directory: ${{ env.REPO_DIR }}
        env:
          FOLIO_MS_STORE_ENV: ${{ secrets.FOLIO_MS_STORE_ENV }}
        run: |
          if ($env:FOLIO_MS_STORE_ENV -and $env:FOLIO_MS_STORE_ENV.Trim().Length -gt 0) {
            New-Item -ItemType Directory -Path functions -Force | Out-Null
            Set-Content -LiteralPath 'functions/.env' -Value $env:FOLIO_MS_STORE_ENV -Encoding utf8
            Write-Host 'functions/.env creado desde secret FOLIO_MS_STORE_ENV'
          } else {
            Write-Host 'Sin secret FOLIO_MS_STORE_ENV: el build Store no tendrá dart-define MS_STORE_* (puedes usar -Skip MSIX si falla).'
          }

      - name: Run builld_all.ps1 (solo Windows)
        shell: pwsh
        working-directory: ${{ env.REPO_DIR }}
        run: |
          $skipMsix = ($env:SKIP_MSIX_INPUT -eq 'true')
          $args = @('-SkipAndroid', '-SkipLinux')
          if ($skipMsix) { $args += '-SkipMicrosoftStore' }
          & ./builld_all.ps1 @args

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: folio-output-windows
          path: ${{ env.REPO_DIR }}/Output/*
          if-no-files-found: warn

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        shell: bash
        run: |
          repo_url="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --no-tags --depth 1 "$repo_url" "$REPO_DIR"
          cd "$REPO_DIR"
          git fetch --no-tags --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Flutter SDK (pinned)
        shell: bash
        run: |
          flutter_dir="$HOME/flutter"
          if [ ! -x "$flutter_dir/bin/flutter" ]; then
            git clone https://github.com/flutter/flutter.git "$flutter_dir"
          fi
          cd "$flutter_dir"
          git fetch --depth 1 origin "$FLUTTER_PIN"
          git checkout --detach FETCH_HEAD
          echo "$flutter_dir/bin" >> "$GITHUB_PATH"

      - name: Flutter doctor (Android)
        shell: bash
        working-directory: ${{ env.REPO_DIR }}
        run: |
          sdk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          flutter config --android-sdk "$sdk"
          yes | flutter doctor --android-licenses || true
          flutter doctor -v

      - name: Build APK
        shell: bash
        working-directory: ${{ env.REPO_DIR }}
        run: |
          dart pub get --enforce-lockfile
          flutter build apk --release --dart-define=FOLIO_DISTRIBUTION=play_store

      - name: Copy APK to Output
        shell: bash
        working-directory: ${{ env.REPO_DIR }}
        run: |
          mkdir -p Output
          raw=$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//')
          ver="${raw//+/-}"
          cp -f build/app/outputs/flutter-apk/app-release.apk "Output/Folio-Android-PlayStore-${ver}.apk"
          ls -la Output/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-output-android
          path: ${{ env.REPO_DIR }}/Output/*.apk
          if-no-files-found: error

  linux-bundle:
    name: Linux bundle ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        shell: bash
        run: |
          repo_url="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --no-tags --depth 1 "$repo_url" "$REPO_DIR"
          cd "$REPO_DIR"
          git fetch --no-tags --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Install Linux build deps
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install Flutter SDK (pinned)
        shell: bash
        run: |
          flutter_dir="$HOME/flutter"
          if [ ! -x "$flutter_dir/bin/flutter" ]; then
            git clone https://github.com/flutter/flutter.git "$flutter_dir"
          fi
          cd "$flutter_dir"
          git fetch --depth 1 origin "$FLUTTER_PIN"
          git checkout --detach FETCH_HEAD
          echo "$flutter_dir/bin" >> "$GITHUB_PATH"

      - name: Build Linux
        shell: bash
        working-directory: ${{ env.REPO_DIR }}
        run: |
          dart pub get --enforce-lockfile
          flutter build linux --release --dart-define=FOLIO_DISTRIBUTION=github

      - name: ZIP bundle to Output
        shell: bash
        working-directory: ${{ env.REPO_DIR }}
        run: |
          root="$GITHUB_WORKSPACE/$REPO_DIR"
          mkdir -p "$root/Output"
          raw=$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//')
          ver="${raw//+/-}"
          (cd "$root/build/linux/x64/release" && zip -r "$root/Output/Folio-Linux-GitHub-${ver}.zip" bundle)
          ls -la "$root/Output/"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-output-linux
          path: ${{ env.REPO_DIR }}/Output/*.zip
          if-no-files-found: error
