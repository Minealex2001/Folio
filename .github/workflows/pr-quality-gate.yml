name: PR Quality Gate

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  analyze-and-test:
    name: Analyze and Test
    if: github.event.pull_request.draft == false
    runs-on: windows-latest
    timeout-minutes: 35

    env:
      REPO_DIR: source

    steps:
      - name: Checkout source (no external actions)
        shell: pwsh
        run: |
          $repoUrl = "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --no-tags --depth 1 $repoUrl $env:REPO_DIR
          Set-Location $env:REPO_DIR
          git fetch --no-tags --depth 1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD

      - name: Install Flutter SDK (stable)
        shell: pwsh
        run: |
          $flutterDir = Join-Path $env:USERPROFILE 'flutter'
          if (-not (Test-Path (Join-Path $flutterDir 'bin\flutter.bat'))) {
            git clone https://github.com/flutter/flutter.git $flutterDir
          }
          Set-Location $flutterDir
          git fetch --depth 1 origin db50e20168
          git checkout --detach db50e20168
          (Join-Path $flutterDir 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Flutter version
        shell: pwsh
        run: flutter --version

      - name: Install dependencies
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: dart pub get --enforce-lockfile

      - name: Static analysis
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: flutter analyze

      - name: Run tests with coverage
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: flutter test --coverage

      - name: Coverage summary
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: |
          $lcovPath = Join-Path (Get-Location) 'coverage\lcov.info'
          if (-not (Test-Path $lcovPath)) {
            Write-Error "Coverage file not found: $lcovPath"
            exit 1
          }

          $linesFound = 0
          $linesHit = 0

          Get-Content $lcovPath | ForEach-Object {
            if ($_ -match '^LF:(\d+)$') { $linesFound += [int]$matches[1] }
            if ($_ -match '^LH:(\d+)$') { $linesHit += [int]$matches[1] }
          }

          if ($linesFound -le 0) {
            Write-Error 'No executable lines found in coverage report.'
            exit 1
          }

          $coverage = [math]::Round(($linesHit / $linesFound) * 100, 2)
          $summary = "Coverage: $coverage% ($linesHit/$linesFound lines)"
          Write-Host $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
