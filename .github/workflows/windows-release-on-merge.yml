name: Windows Release on Merge

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:
    inputs:
      changelog_only:
        description: "Crear solo release notes/changelog (sin instalador)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: windows-release-master
  cancel-in-progress: false

jobs:
  release:
    name: Build Installer and Publish Release
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      REPO_DIR: source

    steps:
      - name: Checkout merged code (no external actions)
        shell: pwsh
        run: |
          $repoUrl = "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --no-tags --depth 1 $repoUrl $env:REPO_DIR
          Set-Location $env:REPO_DIR
          git fetch --no-tags --depth 1 origin ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          git checkout --detach FETCH_HEAD

      - name: Resolve release mode
        id: mode
        shell: pwsh
        run: |
          $changelogOnly = 'false'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ github.event.inputs.changelog_only }}' -eq 'true') {
            $changelogOnly = 'true'
          }
          "changelog_only=$changelogOnly" >> $env:GITHUB_OUTPUT

      - name: Install Flutter SDK (stable)
        shell: pwsh
        run: |
          $flutterDir = Join-Path $env:USERPROFILE 'flutter'
          if (-not (Test-Path (Join-Path $flutterDir 'bin\flutter.bat'))) {
            git clone https://github.com/flutter/flutter.git --branch stable --depth 1 $flutterDir
          }
          (Join-Path $flutterDir 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Flutter version
        shell: pwsh
        run: flutter --version

      - name: Resolve version from pubspec
        id: version
        shell: pwsh
        working-directory: ${{ env.REPO_DIR }}
        run: |
          $line = Get-Content pubspec.yaml | Where-Object { $_ -match '^version:\s*' } | Select-Object -First 1
          if (-not $line) {
            throw 'No se encontro la linea version: en pubspec.yaml'
          }

          $rawVersion = ($line -replace '^version:\s*', '').Trim()
          $semver = $rawVersion.Split('+')[0].Trim()

          if ($semver -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\.-]+)?$') {
            throw "Version invalida en pubspec.yaml: $rawVersion"
          }

          "raw=$rawVersion" >> $env:GITHUB_OUTPUT
          "semver=$semver" >> $env:GITHUB_OUTPUT
          "tag=v$semver" >> $env:GITHUB_OUTPUT
          "installer_name=Folio-Setup-$semver" >> $env:GITHUB_OUTPUT

      - name: Ensure release tag does not already exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          gh release view $tag --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Ya existe una release para $tag. Sube la version en pubspec.yaml antes de mergear."
          }
          Write-Host "No existe release para $tag. Continuando."

      - name: Install dependencies
        if: steps.mode.outputs.changelog_only != 'true'
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: flutter pub get

      - name: Build Windows app
        if: steps.mode.outputs.changelog_only != 'true'
        working-directory: ${{ env.REPO_DIR }}
        shell: pwsh
        run: flutter build windows --release

      - name: Install Inno Setup
        if: steps.mode.outputs.changelog_only != 'true'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer executable
        if: steps.mode.outputs.changelog_only != 'true'
        id: installer
        shell: pwsh
        working-directory: ${{ env.REPO_DIR }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $releaseDir = Resolve-Path 'build/windows/x64/runner/Release'
          if (-not (Test-Path $releaseDir)) {
            throw "No se encontro el directorio de salida: $releaseDir"
          }

          $mainExe = Get-ChildItem $releaseDir -Filter '*.exe' | Where-Object {
            $_.Name -notlike 'flutter_windows.dll' -and $_.Name -notlike 'vcruntime*'
          } | Select-Object -First 1

          if (-not $mainExe) {
            throw 'No se encontro ejecutable principal en build/windows/x64/runner/Release'
          }

          $issPath = Join-Path $env:RUNNER_TEMP 'folio_installer.iss'
          $appVersion = '${{ steps.version.outputs.semver }}'
          $outputBase = '${{ steps.version.outputs.installer_name }}'

          @"
          #define MyAppName "Folio"
          #define MyAppVersion "$appVersion"
          #define MyAppPublisher "Folio"
          #define MyAppExeName "$($mainExe.Name)"

          [Setup]
          AppId={{17A9F1CC-D1AB-4F8A-8B34-915364F4A8C6}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          DisableProgramGroupPage=yes
          OutputDir=dist
          OutputBaseFilename=$outputBase
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern

          [Languages]
          Name: "spanish"; MessagesFile: "compiler:Languages\\Spanish.isl"
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "build\\windows\\x64\\runner\\Release\\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\\{#MyAppName}"; Filename: "{app}\\{#MyAppExeName}"
          Name: "{autodesktop}\\{#MyAppName}"; Filename: "{app}\\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path $issPath -Encoding ascii

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

          $installerPath = Join-Path (Resolve-Path 'dist') "${{ steps.version.outputs.installer_name }}.exe"
          if (-not (Test-Path $installerPath)) {
            throw "No se pudo generar el instalador esperado: $installerPath"
          }

          "path=$installerPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release (with installer)
        if: steps.mode.outputs.changelog_only != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $installerPath = '${{ steps.installer.outputs.path }}'
          gh release create $tag $installerPath --repo '${{ github.repository }}' --target master --title $tag --generate-notes

      - name: Publish GitHub release (changelog only)
        if: steps.mode.outputs.changelog_only == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          gh release create $tag --repo '${{ github.repository }}' --target master --title $tag --notes ""
